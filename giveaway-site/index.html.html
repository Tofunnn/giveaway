<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Giveaway Picker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #fff1f6, #fff7ed);
      color: #333;
    }
    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.9);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    h1, h2 { margin-top: 0; }
    input, textarea, select, button {
      width: 100%;
      padding: 12px 14px;
      margin-top: 8px;
      margin-bottom: 14px;
      border: 1px solid #ddd;
      border-radius: 14px;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea { min-height: 220px; resize: vertical; }
    button {
      background: #f9a8d4;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { opacity: 0.92; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .winner {
      background: linear-gradient(to right, #fce7f3, #fef3c7);
      border-radius: 18px;
      padding: 14px;
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }
    .small { font-size: 12px; color: #666; }
    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🎁 X Giveaway Picker</h1>
      <p>Paste your X link for reference, then paste usernames or comments to randomly pick winner(s).</p>

      <label>X Post Link</label>
      <input id="postLink" placeholder="https://x.com/youraccount/status/1234567890" />

      <div class="row">
        <div>
          <label>Mode</label>
          <select id="mode">
            <option value="retweet">Repost only</option>
            <option value="comment">Comments only</option>
            <option value="both">Repost + comments</option>
          </select>
        </div>
        <div>
          <label>Number of Winners</label>
          <input id="winnerCount" type="number" min="1" value="1" />
        </div>
      </div>

      <label>Participant List</label>
      <textarea id="entries" placeholder="Repost mode:
@anya
@jenny

Comment mode:
@anya | joining
@jenny | done"></textarea>
      <div class="small">For comments, use: @username | comment text</div>

      <button onclick="pickWinners()">Pick Winner</button>
      <button onclick="downloadEntries()">Download CSV</button>
      <button onclick="clearAll()">Clear</button>
    </div>

    <div class="card">
      <h2>Results</h2>
      <div id="summary">No winner yet.</div>
      <div id="winnerBox"></div>
    </div>
  </div>

  <script>
    function normalizeUsername(input) {
      return input
        .trim()
        .replace(/^https?:\/\/x\.com\//i, '')
        .replace(/^https?:\/\/twitter\.com\//i, '')
        .replace(/^@+/, '')
        .replace(/\/$/, '')
        .split(/[/?#\s]/)[0]
        .toLowerCase();
    }

    function parseEntries(text, mode) {
      const lines = text.split('\n').map(x => x.trim()).filter(Boolean);
      const parsed = [];
      for (const line of lines) {
        if (mode !== 'retweet' && line.includes('|')) {
          const parts = line.split('|');
          const username = normalizeUsername(parts[0] || '');
          const comment = parts.slice(1).join('|').trim();
          if (username) parsed.push({ username, comment });
        } else {
          const username = normalizeUsername(line);
          if (username) parsed.push({ username, comment: '' });
        }
      }
      const unique = [];
      const seen = new Set();
      for (const item of parsed) {
        if (!seen.has(item.username)) {
          seen.add(item.username);
          unique.push(item);
        }
      }
      return unique;
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickWinners() {
      const mode = document.getElementById('mode').value;
      const text = document.getElementById('entries').value;
      const winnerCount = Math.max(1, parseInt(document.getElementById('winnerCount').value || '1', 10));
      const entries = parseEntries(text, mode);
      const summary = document.getElementById('summary');
      const winnerBox = document.getElementById('winnerBox');
      winnerBox.innerHTML = '';

      if (!entries.length) {
        summary.textContent = 'No eligible entries found.';
        return;
      }

      const winners = shuffle(entries).slice(0, Math.min(winnerCount, entries.length));
      summary.textContent = `Eligible entries: ${entries.length}`;

      winners.forEach((winner, index) => {
        const div = document.createElement('div');
        div.className = 'winner';
        div.textContent = `Winner ${index + 1}: @${winner.username}${winner.comment ? ' — ' + winner.comment : ''}`;
        winnerBox.appendChild(div);
      });
    }

    function downloadEntries() {
      const mode = document.getElementById('mode').value;
      const text = document.getElementById('entries').value;
      const entries = parseEntries(text, mode);
      const csv = ['username,comment', ...entries.map(e => `"${e.username}","${(e.comment || '').replaceAll('"','""')}"`)].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'giveaway-entries.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearAll() {
      document.getElementById('postLink').value = '';
      document.getElementById('entries').value = '';
      document.getElementById('summary').textContent = 'No winner yet.';
      document.getElementById('winnerBox').innerHTML = '';
    }
  </script>
</body>
</html>
